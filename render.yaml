services:
  - type: web
    name: eunoia
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi --log-file -
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_USE_SQLITE
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_DB_CHARSET
        value: utf8mb4
      - key: DJANGO_DB_SQL_MODE
        value: STRICT_TRANS_TABLES
      - key: DJANGO_DB_CONNECT_TIMEOUT
        value: "5"
      - key: DJANGO_DB_CONN_MAX_AGE
        value: "60"
      - key: DJANGO_DB_CONN_HEALTH_CHECKS
        value: "True"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_USE_X_FORWARDED_HOST
        value: "True"
      - key: DJANGO_COOKIE_DOMAIN
        sync: false
      - key: DJANGO_DB_SSL_CA
        sync: false
      - key: DJANGO_DB_SSL_CERT
        sync: false
      - key: DJANGO_DB_SSL_KEY
        sync: false
      - key: EUNOIA_DEFAULT_TEMPORARY_PASSWORD
        sync: false
      - key: EUNOIA_ADMIN_EMAIL
        sync: false
      - key: EUNOIA_ADMIN_PASSWORD
        sync: false
