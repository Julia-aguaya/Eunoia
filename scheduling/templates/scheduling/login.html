<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Login | Eunoia</title>
</head>
<body>
    <h1>Ingresar</h1>
    <p>Entra con tu email y contrasena para seguir en tu portal.</p>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        {{ form.non_field_errors }}
        <p>
            <label for="{{ form.email.id_for_label }}">Email</label>
            {{ form.email }}
            {{ form.email.errors }}
        </p>
        <p>
            <label for="{{ form.password.id_for_label }}">Contrasena</label>
            {{ form.password }}
            {{ form.password.errors }}
        </p>
        <button type="submit">Ingresar</button>
    </form>
</body>
</html>
