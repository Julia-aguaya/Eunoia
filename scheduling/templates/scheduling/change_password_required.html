<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Cambio obligatorio de contrasena | Eunoia</title>
</head>
<body>
    <h1>Cambiar contrasena</h1>
    <p>Tu contrasena es temporal. Define una nueva para continuar.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <p>
            <label for="{{ form.new_password1.id_for_label }}">Nueva contrasena</label>
            {{ form.new_password1 }}
            {{ form.new_password1.errors }}
        </p>
        <p>
            <label for="{{ form.new_password2.id_for_label }}">Repetir nueva contrasena</label>
            {{ form.new_password2 }}
            {{ form.new_password2.errors }}
        </p>
        <button type="submit">Guardar y continuar</button>
    </form>
</body>
</html>
